# EI V2 gates — unit tests + rigorous eval + promotion gate check.
# Runs on push/PR when EI-related code changes, and weekly for trend tracking.
# V1 remains authoritative; V2 is advisory until promotion criteria are met.
name: EI V2 gates

on:
  push:
    branches: [main, master]
    paths:
      - 'phoenix_v4/quality/**'
      - 'config/quality/ei_v2*'
      - 'config/quality/ei_v2_promotion*'
      - 'tests/test_ei_v2*'
      - 'scripts/ci/run_ei_v2*'
      - 'scripts/ci/check_ei_v2*'
      - '.github/workflows/ei-v2-gates.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'phoenix_v4/quality/**'
      - 'config/quality/ei_v2*'
      - 'config/quality/ei_v2_promotion*'
      - 'tests/test_ei_v2*'
      - 'scripts/ci/run_ei_v2*'
      - 'scripts/ci/check_ei_v2*'
  schedule:
    - cron: '0 4 * * 1'  # Weekly Monday 4am UTC for trend tracking
  workflow_dispatch:

jobs:
  ei-v2-unit-tests:
    name: EI V2 unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Run EI V2 test suite (28 tests)
        run: |
          PYTHONPATH=. python -m pytest tests/test_ei_v2.py \
            -v --tb=short -x

  ei-v2-rigorous-eval:
    name: EI V2 rigorous eval (3 books)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: ei-v2-unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements-test.txt

      - name: Run rigorous evaluation (3-book sample)
        run: |
          PYTHONPATH=. python scripts/ci/run_ei_v2_rigorous_eval.py --sample 3

      - name: Check V2 promotion readiness
        run: |
          PYTHONPATH=. python scripts/ci/check_ei_v2_promotion_gate.py \
            --eval-report artifacts/ei_v2/eval_rigorous_report.json \
            --criteria config/quality/ei_v2_promotion_criteria.yaml
        continue-on-error: true  # advisory until V2 earns promotion

      - name: Upload EI V2 evidence
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ei-v2-evidence
          path: |
            artifacts/ei_v2/eval_rigorous_report.json
            artifacts/ei_v2/eval_rigorous_summary.txt
            artifacts/ei_v2/promotion_gate_result.json
          if-no-files-found: ignore
