# Pearl News: scheduled feed ingest and optional WordPress post.
# Runs on schedule so articles can be produced even when your laptop is off.
# Set repository secrets WORDPRESS_SITE_URL, WORDPRESS_USERNAME, WORDPRESS_APP_PASSWORD to enable posting.
# Without secrets, the post step runs in dry-run mode. See docs/PEARL_NEWS_GITHUB_SCHEDULING.md.
name: Pearl News scheduled

on:
  schedule:
    # 6:00 and 18:00 UTC daily
    - cron: '0 6,18 * * *'
  workflow_dispatch: # allow manual run

jobs:
  pearl-news:
    runs-on: ubuntu-latest
    env:
      WORDPRESS_SITE_URL: ${{ secrets.WORDPRESS_SITE_URL }}
      WORDPRESS_USERNAME: ${{ secrets.WORDPRESS_USERNAME }}
      WORDPRESS_APP_PASSWORD: ${{ secrets.WORDPRESS_APP_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Debug - list repo contents
        run: |
          echo "=== Branch: ${{ github.ref_name }} ==="
          ls -la
          echo "---"
          ls -la tests/ 2>/dev/null || echo "tests/ not found"
          ls -la tests/test_pearl_news/ 2>/dev/null || echo "tests/test_pearl_news/ not found"
          ls -la test_pearl_news/ 2>/dev/null || echo "test_pearl_news/ not found"
          ls -la pearl_news/ 2>/dev/null || echo "pearl_news/ not found"
          echo "--- find ---"
          find . -name "test_pearl_news" -type d 2>/dev/null
          find . -name "test_feed_ingest.py" 2>/dev/null

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pearl News dependencies
        run: |
          pip install feedparser pyyaml requests pytest

      - name: Run Pearl News tests
        run: |
          if [ -d tests/test_pearl_news ]; then
            PYTHONPATH=. python -m pytest tests/test_pearl_news/ -v -k "not real_rss"
          elif [ -d test/test_pearl_news ]; then
            PYTHONPATH=. python -m pytest test/test_pearl_news/ -v -k "not real_rss"
          elif [ -d test_pearl_news ]; then
            PYTHONPATH=. python -m pytest test_pearl_news/ -v -k "not real_rss"
          elif [ -d tests/pearl_news ]; then
            PYTHONPATH=. python -m pytest tests/pearl_news/ -v -k "not real_rss"
          else
            echo "No Pearl News test dir found"
            exit 1
          fi

      - name: Run full pipeline (ingest → classify → assemble → QC)
        run: |
          python -m pearl_news.pipeline.run_article_pipeline \
            --feeds pearl_news/config/feeds.yaml \
            --out-dir artifacts/pearl_news/drafts \
            --limit 10

      - name: Upload draft artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pearl_news_drafts
          path: artifacts/pearl_news/drafts/
          retention-days: 7

      - name: Test WordPress integration (dry-run or post)
        run: |
          shopt -s nullglob
          first=$(ls -1 artifacts/pearl_news/drafts/article_*.json 2>/dev/null | head -1)
          if [ -z "$first" ]; then
            echo "No article_*.json found; skipping"
            exit 0
          fi
          if [ -z "$WORDPRESS_APP_PASSWORD" ]; then
            python scripts/pearl_news_post_to_wp.py --article "$first" --dry-run
          else
            python scripts/pearl_news_post_to_wp.py --article "$first" --status draft
          fi
        continue-on-error: true
