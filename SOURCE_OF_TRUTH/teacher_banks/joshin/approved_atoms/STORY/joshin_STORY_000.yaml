body: |
  Keiko sits at her desk, scrolling through emails at midnight. Her chest tightens — another message from her boss about a missed deadline. She feels the familiar story rising: "I am unreliable. I can't handle pressure. I'm failing everyone." The thought feels absolutely true. But then something shifts. She notices: the story is happening in her mind, and she is aware of it happening. The anxiety is real, but the "I am failing" is a narrative. Not suppressing the anxiety, just seeing that the thinker of these thoughts is not who she is. Under the story, her pure heart is steady. She takes a breath. The story keeps playing, but she is no longer caught.
