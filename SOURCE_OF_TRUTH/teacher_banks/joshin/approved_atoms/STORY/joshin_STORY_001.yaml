body: |
  Hiroshi notices shame rising in his chest during a meeting. He made a mistake presenting numbers to the team. The story is loud: "Everyone sees me as incompetent. I don't belong here." He feels small. Then he pauses. He asks himself: "Who is telling this story?" The answer arrives quietly: just the conditioned mind, spinning its familiar narrative. His mistake was real. The shame is real. But the identity wrapped around it — the belief that the mistake defines him — that's the story. He breathes. It's like watching clouds move across the sky. The sky doesn't move.
