body: |
  Sota wakes with burnout lodged in his body. He's been pushing for three years — work, responsibilities, the story that rest is weakness. Today he can't move. The overwhelm is vast. But as he lies there, something opens. He sees the story: "If I stop, I fail. If I rest, I'm lazy. I must earn my right to exist." He watches this narrative play out like a film. It's been running since childhood. He didn't write it. The pure heart underneath all this striving never asked for proof of worth. It just is. The burnout doesn't disappear, but he stops fighting it. He stops fighting himself. Something in him returns home.
