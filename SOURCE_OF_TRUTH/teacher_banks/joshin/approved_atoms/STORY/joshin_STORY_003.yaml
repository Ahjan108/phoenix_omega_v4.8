body: |
  Ayumi sets boundaries at work, and anxiety floods in immediately. The story arrives: "People will think I'm selfish. I'll be abandoned. I'm being unkind." She feels the weight. But she pauses and inquires: "Is this true?" The answer is subtle. The story is old conditioning, not reality. She can feel care for others AND hold her own limits. These aren't opposite. The pure heart can do both. Her boundary stands. The anxiety doesn't vanish, but she no longer mistakes the story for dharma — the way things actually are.
