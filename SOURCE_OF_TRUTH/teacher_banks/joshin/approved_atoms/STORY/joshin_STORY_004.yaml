body: |
  Riku compares himself to others constantly. The shame blooms: "I'm not as smart, not as successful, not as valuable." The story feels like fact. But one morning, something lands. He sees that the comparing mind is not the problem — it's the belief in its conclusions that create suffering. The mind compares; that's what minds do. But is the comparing mind him? In inquiry, he finds the answer is no. Under all the stories about his inadequacy, something stable remains. Not proud, not special — just complete as it is.
