body: |
  Nori feels deep anxiety about not being enough. The story: "I'm broken. Others have it figured out. I'm failing at life." She's believed this for years. Then she notices something simple: the story keeps changing its evidence, but the verdict stays the same. The mind is not looking for truth; it's defending a belief. When she stops defending against the belief and just sees it, something shifts. The anxiety doesn't leave, but the identity fused with it loosens. She is not her story.
