body: |
  Tomoko carries shame about her voice and her needs. The story is old: "Speak up and you'll be punished. Stay small and you'll be safe." She's believed it unconsciously for decades. One day, speaking softly about something that matters to her, she hears the story in real time. Not as truth but as conditioning. The voice didn't disappear, but she saw through the cage it was built from. Her pure heart was always here, wanting to speak. The fear is real. The story is real. But neither is who she is underneath.
