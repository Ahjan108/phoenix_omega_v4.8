body: |
  Gin is burnt out and ashamed of it. The story layers: "I should be stronger. I shouldn't need rest. My exhaustion means I'm weak." She believes all of this. But in a quiet moment, she inquires: "What if the exhaustion itself is the teacher?" What if the burnout is the system showing her it's been running on a false story about who she needs to be? The exhaustion is real. The body's signal is real. But the shame added on top — the belief that fatigue is a failure — that's the story. She drops it. The body relaxes into what actually is.
