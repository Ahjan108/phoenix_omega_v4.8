body: |
  Hiro struggles with self-worth that collapses easily. Any small criticism triggers the story: "I'm fundamentally flawed. Everyone will discover it eventually." The anxiety tightens his chest. Then he notices something crucial: the story doesn't make a claim about his actual behavior — it makes a claim about his essence. And that claim is being defended by the same mind that generated it. When he steps back and observes this mechanism, the grip loosens. The flaw story is just a story. His essence remains untouched underneath it.
