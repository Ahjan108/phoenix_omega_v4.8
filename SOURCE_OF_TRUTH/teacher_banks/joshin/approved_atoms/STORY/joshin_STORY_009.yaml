body: |
  Mao has anxiety about belonging. The story plays: "You don't fit in anywhere. You're too much or not enough. You're fundamentally alone." She's exhausted by the narrative. One day, in a conversation with a friend, she hears herself tell the story out loud — and recognizes it as a story. Not as her reality, but as a repeating script. The loneliness doesn't disappear, but the belief that it proves something about her worth does. The pure heart is not concerned with fitting in. It's already whole.
