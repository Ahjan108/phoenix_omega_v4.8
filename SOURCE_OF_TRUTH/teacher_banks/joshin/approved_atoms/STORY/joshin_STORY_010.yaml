body: |
  Yoshi feels shame about needing help. The story is rigid: "Real people don't ask for support. I should be independent. Needing others means I'm weak." He isolates with this belief. Then something shifts. He realizes the thinker of this story is operating from fear, not wisdom. The pure heart naturally reaches out. Isolation is not strength — it's the story defending itself. He asks for help and feels both the vulnerability and something solid underneath it.
