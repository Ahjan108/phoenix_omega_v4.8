body: |
  Rin struggles with anxiety and perfectionism. The story is tight: "If I'm not perfect, I'm a failure. Others are watching. I have to earn safety through flawlessness." The pressure is relentless. One day, exhausted, she stops fighting and simply inquires: "What happens if I'm not perfect?" The answer surprises her: nothing catastrophic. The story has been running a simulation in her head, not describing reality. Perfectionism was a survival mechanism, not a requirement. In seeing this, something releases. The pure heart is fine with being human.
