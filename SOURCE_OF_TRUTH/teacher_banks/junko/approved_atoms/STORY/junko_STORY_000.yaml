atom_id: junko_STORY_000
body: |
  Yuki sits at the kitchen table before dawn. The coffee isn't done brewing. Her hands are shaking—some old anxiety about the presentation she'll give in three hours.
  
  She watches the shaking without fixing it. Just looks at her hands. The tremor continues. She doesn't try to steady herself.
  
  A thought comes: *this is what fear does*. Not something she's doing wrong. Not something to hide. Just the body being the body.
  
  She drinks the coffee when it's ready. The anxiety is still there. But something in the watching of it has loosened. The shaking continues, but she's not arguing with it anymore.
