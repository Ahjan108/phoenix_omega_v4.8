atom_id: junko_STORY_001
body: |
  Hana hasn't slept well in weeks. The guilt sits on her chest—something she said to her manager that she shouldn't have. Over and over, she rehearses what she could have said instead.
  
  One morning she sits on the edge of the bed and decides to do zazen for twenty minutes instead of rehearsing.
  
  The guilt doesn't leave. Her mind tries to pull her back into the story. She watches that pull. Comes back to the breath.
  
  When she stands up, nothing is solved. But she's met herself in a different way. The guilt is still there, but it's smaller—just a sound in the room, not the whole room.
