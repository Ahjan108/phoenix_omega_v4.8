atom_id: junko_STORY_002
body: |
  Kenji is burning out. Seventy-hour weeks for three months. Something inside him has gone quiet—not peaceful quiet, but empty quiet. He can't feel what he wants anymore.
  
  His teacher suggests he stop trying to fix the burnout and instead watch it. Just notice what's happening without a plan to change it.
  
  For a week, Kenji sits with the exhaustion. Doesn't try to restore himself. Doesn't blame himself. Just watches—the heaviness, the flatness, the way his body moves through the day like it's underwater.
  
  On the eighth day, without any effort, he takes a Tuesday afternoon off. Not because he decided to heal. Because something in him was finally just tired enough to stop.
