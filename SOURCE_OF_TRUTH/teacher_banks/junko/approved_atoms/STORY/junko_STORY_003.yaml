atom_id: junko_STORY_003
body: |
  Nori has always been the person who says yes. Yes to the extra project, yes to helping her sister again, yes to staying late. She doesn't know how to say no without feeling selfish.
  
  One day someone asks her to help and she says: "I can't." Not with explanation. Not with apology. Just the truth.
  
  The shame floods in immediately. She did something wrong. She's a bad person. The voice is so loud.
  
  But underneath the shame, there's something else—a tiny space where "no" was simply honest. Not good or bad. Just what was true.
  
  She sits with both of them—the shame and the honesty—in the same breath. Both real. Neither canceling the other out.
