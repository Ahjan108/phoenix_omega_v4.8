atom_id: junko_STORY_004
body: |
  Sato's self-worth has been tied to achievement since childhood. Good grades, good job, good reputation. When she makes a mistake at work—a small one, caught and fixed—something in her shatters.
  
  For days she cannot look at herself. The story runs: *I'm not actually good. I never was. Everyone will see it now.*
  
  Her teacher asks: "What if the mistake is just a mistake? Not a reflection. Not evidence. Just something that happened."
  
  It seems impossible. But Sato begins to sit with the possibility. Not believing it yet. Just letting it exist as a question in her mind.
  
  The shame is still there. But something has shifted. She doesn't have to convince herself she's good anymore. She's just... there. Flawed. Human. Like everyone.
