atom_id: junko_STORY_005
body: |
  Emi is afraid of her own anger. She grew up learning that anger wasn't safe—that it would destroy things, hurt people she loved. So she swallowed it, year after year, until it became invisible even to herself.
  
  Now, sitting in zazen one evening, the anger surfaces. Raw and hot. She wants to push it back down.
  
  Instead, she stays. Let's the anger burn through her body. Doesn't act on it. Doesn't hate herself for it. Just sits with it like she would sit with the rain.
  
  When the session ends, she's still angry. But the anger is no longer a betrayal. It's just energy. Information. The body's way of saying: *something matters here*.
