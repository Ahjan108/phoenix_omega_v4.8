atom_id: junko_STORY_006
body: |
  Taro comes to the zendo because he's overwhelmed. There's always something else to do, someone else who needs him. His mind won't stop. He hasn't rested in months.
  
  He assumes zazen will fix this. That meditation is a technique to achieve calm.
  
  The first twenty minutes are terrible. His mind is chaos. He sits anyway.
  
  By week three, he stops expecting anything. He just sits. And something interesting happens—he doesn't get calm. But he stops fighting the lack of calm.
  
  The overwhelm is still there. But it no longer feels like a failure. It's just the weather of this moment. And he's just sitting in it.
