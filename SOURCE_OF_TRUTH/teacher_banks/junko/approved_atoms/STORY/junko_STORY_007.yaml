atom_id: junko_STORY_007
body: |
  Yumi has always needed permission. Permission to rest, permission to want things, permission to take up space. She asks before she acts. She apologizes before she speaks.
  
  One morning her therapist asks: "Who are you waiting for permission from?"
  
  The answer comes immediately: from the person who raised her. From authority. From some internalized "should."
  
  But here's what Yumi notices: that authority isn't actually here. It's a memory. A story her nervous system kept playing.
  
  She doesn't overcome it that day. But she starts to see it. And something in the simple *seeing* begins to shift. The permission, it turns out, was always hers.
