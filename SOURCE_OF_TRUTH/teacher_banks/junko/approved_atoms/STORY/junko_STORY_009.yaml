atom_id: junko_STORY_009
body: |
  Kaito carries deep shame about his sexuality. For years he hid it. When he finally came out to his family, the rejection was swift and real.
  
  The shame didn't disappear with coming out. It went deeper—now it was mixed with anger at his family, at the time he lost, at the person he wasn't allowed to be.
  
  His meditation teacher doesn't try to reframe it. Just says: "Sit with it. Not to change it. To know it."
  
  For months, Kaito does. And something unexpected happens. The shame has a texture. A temperature. A color. The closer he looks at it, the less solid it becomes.
  
  Not gone. But no longer the full truth of who he is.
