atom_id: junko_STORY_010
body: |
  Misa has worked in customer service for eight years. She has learned to be endlessly patient, to absorb other people's anger, to smile through her own exhaustion. It was a choice at first. Now it's invisible.
  
  One day she can't do it. A customer is cruel, and something in her just... says no. She walks away. Takes a break. Comes back calmer.
  
  For a week, she waits to feel guilty. To feel that she's failed. But the guilt doesn't come with the same weight.
  
  And sitting quietly one evening, she realizes something simple: saying no wasn't selfish. It was an act of honesty. The boundaries weren't walls—they were breath.
