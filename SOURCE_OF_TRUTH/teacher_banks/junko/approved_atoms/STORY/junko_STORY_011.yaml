atom_id: junko_STORY_011
body: |
  Shiro is a perfectionist. His self-worth is tied to what he produces—clean code, perfect meetings, work that has no faults. When he finds a bug in his own code, something inside him fractures.
  
  *I'm a fraud. Everyone's going to know I'm not actually good at this.*
  
  At the suggestion of a friend, he comes to sit in zazen. Not to fix himself. Just to sit.
  
  He feels the shame-story running. And he watches it run. Like clouds moving across the sky. Real, present, but not solid.
  
  The bug doesn't disappear. Neither does the shame entirely. But they've become separate from who he actually is. And somehow, that's enough to get back to work.
