body: |
  Amara has carried shame in silence for years. The secret feels heavier than the original wound. She speaks the truth aloud to a trusted witness — the thing she thought would destroy her, the thing she thought made her unworthy. What happens is unexpected: the shame begins to collapse. Not because the act was suddenly forgiven, but because truth itself is a different frequency than hiding. In being witnessed without judgment, she feels the feather of truth balance against her heart. The act was real. The responsibility is real. But the isolation that shame created was an illusion. She belongs to the field again.
