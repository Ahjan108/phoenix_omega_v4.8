body: |
  Kesi is overwhelmed by the expectations of others. She has bent herself into shapes that are not hers. Her anxiety rises each time she imagines disappointing someone. Then she asks: "What is true here? Not what they want. Not what I think I should be. What is actually true about me and my capacity?" In that simple inquiry, something shifts. Ma'at is not about pleasing the gods or earning worthiness. It's about alignment with what is real. She cannot be other than who she is. The truth of her limits becomes a relief, a boundary that brings peace.
