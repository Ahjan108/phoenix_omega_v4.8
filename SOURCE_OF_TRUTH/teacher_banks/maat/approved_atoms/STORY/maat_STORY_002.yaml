body: |
  Nile has grieved in private, afraid that her grief is too much, too raw, unacceptable. But grief that is not witnessed becomes stagnant — it turns into a knot. One day she allows the grief to be seen. She sits with another who simply receives it without trying to fix it or resolve it. In being witnessed, the grief becomes the ground. Not that it heals or disappears, but that it transforms from something shameful into something sacred. The Egyptian understanding of grief is that it is necessary, that it must be honored. Nile feels her heart break open — and in that breaking, she is whole.
