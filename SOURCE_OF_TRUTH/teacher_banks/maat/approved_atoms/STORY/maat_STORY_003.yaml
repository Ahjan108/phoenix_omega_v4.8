body: |
  Zara is caught in a spiral of anxiety about her self-worth. She seeks external validation constantly. But truth is grounding — it doesn't move. She begins to ask: "What is true about me independent of what others believe?" The question is hard to answer because she's always defined herself by reflection. But beneath the anxiety, there is ground. An inherent worth that doesn't require proof. She stops defending and starts simply being. Ma'at teaches: truth does not need defending.
