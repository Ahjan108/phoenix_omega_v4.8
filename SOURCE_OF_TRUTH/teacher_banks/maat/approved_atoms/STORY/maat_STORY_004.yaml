body: |
  Oya has felt shame about setting boundaries. The story: that doing so is selfish, that she is unkind for protecting her own ground. But Ma'at is about right relationship, and right relationship includes her own truth. She asks: "What is actually balanced here? If I give everything, what is the cost?" The question leads her to her own body — the tension, the resentment, the depletion. These are signals that she has left balance. Setting a boundary is not an act of selfishness but a return to truth. In that return, the shame dissolves.
