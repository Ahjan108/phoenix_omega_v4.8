body: |
  Imani is spiraling in anxiety about being found out as a fraud. She performs expertise she doesn't feel. Then she asks herself: "What if I simply told the truth?" Not as a confession, but as an honest statement. "I don't know this yet. I'm learning." The truth is grounding. It is what is. And the truth that she is learning, growing, and human — this is actually worthy of respect than the false performance. Ma'at weighs the feather of truth against the heart, and truth is always lighter.
