body: |
  Sade carries shame about her family, her background, things she believes are marks of unworthiness. But one day she realizes: these things are true about her story, not about her value. The feather of truth does not weigh in favor of shame when the heart is witnessed. She begins to speak her truth — not as apology but as reality. The cosmic order does not reject her. The field welcomes her exactly as she is. The shame was always just a story trying to keep her small, separate. In truth-speaking, she returns to belonging.
