body: |
  Ayana is burning out from trying to be "good" — perfect, accommodating, invisible. The anxiety tightens constantly. But Ma'at teaches balance, not goodness. She asks: "What would be true in a balanced life?" The answer includes her own rest, her own boundaries, her own voice. Not selfishness but ecology. A river that gives everything becomes empty. Balance means her own needs are also part of the equation. In acknowledging this truth, her body begins to release. The shame that had powered her "goodness" starts to dissolve. Balance brings peace.
