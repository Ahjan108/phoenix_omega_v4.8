body: |
  Nia spirals with self-worth when she compares herself to others. But comparison is not truth — it's a distortion of the field. She asks: "What is actually true about me, standing alone?" The answer is quieter but more solid. She has her own gifts. She has her own path. The feather of truth does not compare. It simply measures the heart's alignment with what is. When she stops comparing and starts witnessing, her own ground appears beneath her feet.
