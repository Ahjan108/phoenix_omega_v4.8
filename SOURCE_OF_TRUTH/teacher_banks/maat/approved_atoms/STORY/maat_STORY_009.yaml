body: |
  Ife has anxiety about her voice, whether she has the right to speak. But truth is the birthright of all beings. She asks: "What is actually true in this moment from my perspective?" And she speaks it — not loudly, not aggressively, but simply and honestly. In that speaking, something settles. The anxiety doesn't vanish, but it is no longer the voice she listens to. Ma'at teaches that each being has their own truth to contribute to the balance. Her voice is part of the cosmic order.
