body: |
  Chiamaka carries grief that she thinks she should be over by now. The shame compounds the grief — feeling bad for still feeling bad. But the feather of truth shows her: grief has its own timeline. It cannot be rushed. And grief that is honored — that is witnessed — becomes the ground from which new life grows. She allows herself to grieve fully, without apology. In that permission, something shifts. The grief becomes sacred instead of shameful.
