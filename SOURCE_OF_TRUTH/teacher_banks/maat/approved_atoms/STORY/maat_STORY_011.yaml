body: |
  Adaeze is anxious about her ambitions — whether she's allowed to want things, whether her desires are selfish. But Ma'at includes her own truth. She asks: "What is actually true about what I want and what is balanced in pursuing it?" The question opens space. Ambition in balance is not greed. Growth that honors your own ground is not selfishness. She begins to move toward her true desires, no longer hidden in shame. The feather of truth balances her heart with her wants, and both can be real.
