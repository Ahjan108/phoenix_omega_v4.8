atom_id: master_feung_STORY_000
body: 'Wei sits at her desk, shoulders creeping toward her ears. She has been answering emails for two hours and the anxiety that started small is now a tight knot behind her eyes. She stands, thinking she needs coffee, but instead finds herself in the kitchen breathing shallowly.

Master Feung appears in the doorway. He does not ask if she is overwhelmed. He simply places a hand on her lower back and says: feel here. The belly. Not high in the chest.

Wei closes her eyes. She realizes her breath has been living only in her throat.

Together they stand. Feung reminds her: qi follows breath. When the breath lives only in fear, the qi cannot find its way down. When you breathe into the belly, the qi remembers the earth.

Wei feels her shoulders lower without effort. The knot behind her eyes softens. She does not know if this is qi or simply permission to breathe. She knows it matters less than the fact that her body is remembering how to be at home.'
