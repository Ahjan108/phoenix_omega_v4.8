atom_id: master_feung_STORY_001
body: 'Lin is burning out. She has been working seventy-hour weeks and her body has started to rebel—waking at three in the morning, heart racing, unable to settle even when she is lying down.

One evening she walks to the garden where Master Feung is tending the herbs. She does not speak. Feung hands her a pair of pruning shears and they work together, moving slowly. The plants release their green smell. Twenty minutes pass.

Feung says: look at the way the plant grows. No rushing. Each leaf in its place. Each root going deep to hold what is above.

Lin feels tears in her eyes. She has forgotten that growth is not a race.

Feung continues: your body is a plant. When you burn the branches, the roots die. The exhaustion you feel is not weakness. It is the body saying: I need to rest to grow.

Lin prunes one more branch, and something inside her settles.'
