atom_id: master_feung_STORY_002
body: 'Chen is paralyzed by self-doubt. She has been offered a promotion and cannot believe she deserves it. Every time she thinks of accepting, a voice tells her she is a fraud. The doubt creates a heaviness that moves through her chest and down into her belly.

She meets Master Feung in the courtyard. She tells him about the promotion and the paralysis.

He listens. Then he says: Come. We will walk slowly.

They walk for ten minutes, saying nothing. After a time Feung says: notice the ground beneath you. Each step you take, the earth holds you. It does not question whether you deserve to stand. It simply holds.

He stops and places his palm on her solar plexus. Feel here. This is your dantian, your center. Not your thoughts. Your center knows what it is capable of. The doubt comes from the mind. The knowing comes from here.

Chen feels her breath deepen. She realizes she has been waiting for permission from her thoughts. The ground does not wait.'
