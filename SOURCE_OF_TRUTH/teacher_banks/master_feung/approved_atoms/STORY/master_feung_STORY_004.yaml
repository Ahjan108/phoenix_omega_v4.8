atom_id: master_feung_STORY_004
body: 'Kai comes from a family where worth is measured in achievement. He is successful by any standard, yet he feels like a failure. Beneath the accomplishments runs a current of unworthiness that no promotion can touch.

Master Feung invites him to sit in silence for thirty minutes. Nothing is explained. They simply sit.

After the silence, Feung asks: what did you achieve in those thirty minutes?

Kai looks confused. Nothing. I just sat.

Feung nods. And yet, you exist. Your qi moved through your meridians. Your heart beat. Your body held itself upright. These things required no achievement. They required only being. Tell me: do you think the mountain questions whether it deserves to be a mountain?

Kai feels something shift—a possibility that perhaps his worth is not something he must earn but something that is already complete.

Feung continues: the exhaustion you carry comes from proving what is already true. Rest is not laziness. Rest is alignment with what is.'
