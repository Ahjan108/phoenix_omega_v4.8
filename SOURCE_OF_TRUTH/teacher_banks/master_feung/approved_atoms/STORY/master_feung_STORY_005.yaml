atom_id: master_feung_STORY_005
body: 'Jun is afraid to be still. Stillness means thoughts. Thoughts mean confronting the shame he has carried since childhood. So he stays busy—running, pushing, achieving. The burnout is not surprising to him. What would be surprising is to stop.

One afternoon, Master Feung finds him sitting outside the studio, unable to move. Something has broken.

Feung does not ask what happened. He simply sits beside him. After a long time, he says: you are afraid of the darkness inside. But the darkness you fear is not darkness at all. It is simply unwitness energy. It needs one thing only: attention without judgment.

He guides Jun into a meditation. The meditation is not about achieving peace. It is about allowing the shame to be present without running. To let it move through the meridians instead of being locked in the belly.

By the end, Jun is not healed. But he is no longer running. He is still. And the stillness, for the first time, does not feel like death.'
