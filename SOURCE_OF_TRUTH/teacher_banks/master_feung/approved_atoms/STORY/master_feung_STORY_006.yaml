atom_id: master_feung_STORY_006
body: 'Ling wakes up with panic in her chest and cannot remember why she came to Master Feung. The anxiety has no name. It is just a raw hum beneath everything.

Feung places his hands on her shoulders and asks her to breathe. Not deeply. Just naturally. He places his palm on her dantian—the energy center below her navel.

He says: here. This is where the qi lives when it is at home. Your breath has been living only in the chest, only in the fear. Watch what happens when you invite it home.

For five minutes, they breathe together. Feung''s presence is steady, like a tree. Ling feels her body remembering how to inhale all the way down, how to let the exhale be as important as the inhale.

The panic does not vanish instantly. But it begins to have a rhythm. It begins to be something that moves, rather than something that has frozen her.

Feung whispers: you are safe. The body knows this. Trust it.'
