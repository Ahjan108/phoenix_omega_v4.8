atom_id: master_feung_STORY_007
body: 'Dao has been told his whole life that he is not enough. Not strong enough, not smart enough, not worthy enough. He carries this as a chronic ache in his shoulders and lower back.

Master Feung teaches him a sequence of Qigong movements. Each movement is simple. Each one is done slowly, with attention.

Feung says: most people think strength is about force. But the greatest strength is the ability to be flexible, to flow, to yield. The bamboo does not break in the storm. It bends. That is its power.

Dao practices the movements every day. Over weeks, he notices that his shoulders drop slightly. His breathing becomes deeper. The ache remains but it is no longer the whole story of his body.

One day, Feung says: you came here believing you were not enough. What has changed is not you. What has changed is that you are now paying attention. The qi that was always in your body, you are finally feeling it. The strength was never absent. You were simply not listening.'
