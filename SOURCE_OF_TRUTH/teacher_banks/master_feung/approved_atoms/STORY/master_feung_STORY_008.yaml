atom_id: master_feung_STORY_008
body: 'Yun is experiencing burnout so deep that she cannot imagine returning to work. Every cell in her body is screaming that something must change, but she does not know what or how.

Master Feung does not tell her to quit. Instead, he teaches her to listen to what her body is saying beneath the burnout. He invites her to practice breathing exercises that calm the nervous system and reconnect her with her own knowing.

Over the course of several weeks, something shifts. Yun begins to realize that the burnout was not a failure on her part but a signal. Her body was saying: this does not align with your qi. This is not the way your energy wants to move.

Feung tells her: the body is always telling the truth. When you ignore it, it speaks louder. Burnout is not laziness. It is the body insisting that you listen.

Yun does eventually change her situation, but not from a place of crisis. She changes from a place of alignment with her own energy. The change feels grounded, like something the earth itself is supporting.'
