body: |
  Li is anxious and feels unlovable. The anxiety cycles, disconnecting her from her heart. She begins a simple practice: placing her hand on her heart and saying with sincerity, "I love you. I am here for you." Not trying to feel the love, just speaking the words as an intention, a frequency. Slowly, something shifts. Not dramatic, not miraculous, but gradual. The nervous system begins to settle. She begins to feel held by her own loving attention. Love is a frequency that heals the one who channels it first.
