body: |
  Hui feels anxiety tightening her body. She has tried many things to manage it. Then she practices: visualizing healing light entering her body, specifically moving to where the anxiety is held. Not to get rid of the anxiety, but to meet it with love and light. She imagines her soul guiding the light. Her body begins to release. Not all at once, but gradually. The frequency of love, offered gently with visualization, begins to shift her nervous system. She is not trying to fix herself. She is loving herself into balance.
