body: |
  Fang spirals in anxiety about her boundaries. She says yes when she means no, and shame follows. But when she practices gratitude for the strength it takes to set a boundary — for loving herself enough to protect her own energy — something shifts. The boundary becomes an act of love, not selfishness. She learns to speak her boundary with love and gratitude for the person, even as she holds her own line. Love and boundaries can coexist. Self-love includes saying no.
