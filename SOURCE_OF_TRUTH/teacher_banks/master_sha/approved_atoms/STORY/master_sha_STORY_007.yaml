body: |
  Jing carries burnout that feels like a spiritual crisis. She has given everything and feels empty. She begins to practice: receiving love, not just giving it. She visualizes healing light pouring into her, restoring her soul, her body, her spirit. She chants softly: "I am loved. I am held. I am healed." Not as denial of her burnout, but as a frequency that begins to replenish. Slowly, the source within her begins to refill. She learns that she cannot pour from an empty vessel. Receiving love is part of the healing. Gratitude for the chance to restore herself becomes her practice.
