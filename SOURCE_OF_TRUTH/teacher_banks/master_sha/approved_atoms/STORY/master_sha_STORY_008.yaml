body: |
  Lei feels separated from his soul by shame and self-rejection. His body is tense with the division. He begins a practice of integration: offering love to the part of himself that carries shame. Not trying to fix it, but speaking to it with compassion. "I see you. You tried to protect me. I love you." The soul responds. The body softens. In accepting all of himself with love, the division begins to dissolve. Soul-body-mind-spirit alignment returns.
