body: |
  Mei is anxious about her worthiness. The blockage is in her heart. She practices visualization: imagining healing light in the color of love flowing through her, dissolving the blockage, opening her heart. She pairs this with gratitude for her body, her life, her capacity to feel. The light and gratitude work together. The frequency shifts. Her nervous system begins to settle. Healing happens not through force but through the gentle frequency of love and appreciation meeting what is held.
