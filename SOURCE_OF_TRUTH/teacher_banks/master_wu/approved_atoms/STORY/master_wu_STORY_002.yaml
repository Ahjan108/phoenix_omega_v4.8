atom_id: master_wu_STORY_002
body: |
  Zhen is ashamed of her self-worth struggles. She's been trying to "fix" herself, reading self-help books, forcing positive affirmations.
  
  It's not working. The harder she tries to convince herself she's worthy, the more the doubt returns.
  
  She stops trying. She sits quietly with the doubt itself, the way you'd sit with a difficult person you're learning to understand.
  
  The doubt doesn't go away. But something shifts. It becomes just a voice. Not the voice of truth. Just one perspective.
  
  By not fighting it, she's freed herself from the struggle. The doubt loses power through non-resistance.
