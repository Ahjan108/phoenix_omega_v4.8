atom_id: master_wu_STORY_003
body: |
  Wei has a boundary problem. People always ask too much of him, and he always says yes. He doesn't know how to hold a firm boundary.
  
  His teacher says: "Be like water. Water doesn't argue with the banks that contain it. It simply finds its level. The bank teaches the water where to be."
  
  Wei starts to understand. A boundary isn't a wall to defend. It's just a shape that holds you. Water accepts its container.
  
  He says no to an unreasonable request. It's not aggressive. It's not defensive. It's just where the boundary is.
  
  And surprisingly, people accept it better when there's no force behind it. Just clarity.
