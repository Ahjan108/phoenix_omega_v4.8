atom_id: master_wu_STORY_004
body: |
  Bao is anxious. There's a situation at work that might go badly. His instinct is to try to control every variable, to anticipate every problem.
  
  His teacher asks: "If you were water, how would you approach this?"
  
  Water doesn't anticipate. It doesn't plan. It moves in response to gravity and terrain. It's completely responsive.
  
  Bao tries something radical: he drops his plans. He goes to the meeting prepared, but without a script. Responsive.
  
  Things go differently than he predicted. But not worse. Different, and manageable.
  
  The anxiety was the cost of trying to predict the future. Without that burden, he moves more easily.
