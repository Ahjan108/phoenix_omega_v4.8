atom_id: master_wu_STORY_005
body: |
  Qing has been struggling with shame about her sexuality for years. She's been trying to overcome it through willpower and self-compassion.
  
  A teacher tells her a paradox: "The stone that does not budge is strong. But the water that has no form cannot be broken."
  
  Qing realizes she's been trying to be the stone—fixed, defended, unyielding. But what if she let herself be the water?
  
  Not giving up her identity. But stopping the internal fight. Letting the shame pass through her without resistance.
  
  By not fighting it, she stops drowning in it. The shame becomes just another thing moving through, like weather.
