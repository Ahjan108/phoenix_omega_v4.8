atom_id: master_wu_STORY_006
body: |
  Min is overwhelmed at work. Too many demands, all urgent. She's been trying to power through, but she's approaching collapse.
  
  She sits with her teacher in silence. Long silence. Then the teacher says simply: "What if you did nothing?"
  
  Min laughs nervously. "Everything would fall apart."
  
  "Would it? Or would it find its level, like water?"
  
  Min takes a radical step: she stops. Works less. Does only what's directly in front of her.
  
  Some things don't get done. The world doesn't end. And something in the work that remains becomes clearer, easier.
  
  Wu Wei: less force, more effectiveness.
