atom_id: master_wu_STORY_007
body: |
  Yu has been trying to become a different person. Someone more confident, more accomplished, more worthy.
  
  Her teacher says: "You are trying to be the river when you are already the river. All this effort to become—it's like water trying to be water."
  
  Yu stops trying to transform. She starts paying attention to who she actually is right now.
  
  Not as a failure. Not as something to fix. Just as something that is.
  
  The self-worth doesn't arrive through achievement or positive thinking. It arrives through the simple act of not resisting what is already here.
  
  Tao Te Ching: "In the pursuit of Tao, every day something is dropped."
