atom_id: master_wu_STORY_008
body: |
  Hong is anxious about conflict. She avoids it entirely. But the avoidance costs her—in boundaries, in authenticity, in peace.
  
  Her teacher teaches her about yin and yang. Not opposites fighting, but complementary forces in balance.
  
  "Conflict is not all yin or all yang," he says. "Softness and firmness together. Yielding and clarity both present."
  
  Hong begins to bring both qualities. She's soft in her manner but clear in her boundaries. Yielding in her flexibility but firm in her values.
  
  The conflict doesn't disappear, but it becomes navigable. The paradox works.
