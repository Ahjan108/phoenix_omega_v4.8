atom_id: master_wu_STORY_009
body: |
  Tao is burned out from years of striving. Everything in his life is about achievement and control. He's exhausted.
  
  A teacher asks: "What if there is no ladder to climb? What if fulfillment is not ahead, but here?"
  
  The question is radical. All his life, he's been doing, achieving, reaching. The idea of stopping feels like falling.
  
  But he tries. He stops pushing. He attends to what's actually present—his breath, a meal, a conversation.
  
  Not as a means to something. Just as itself.
  
  The burnout doesn't instantly disappear. But the direction of his life shifts. From striving toward arrival, to presence itself.
