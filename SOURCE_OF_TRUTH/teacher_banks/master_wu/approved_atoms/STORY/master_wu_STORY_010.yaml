atom_id: master_wu_STORY_010
body: |
  Jin is rigid in her self-concept. She's determined who she is, and everything must fit that identity.
  
  Her teacher mentions a koan: "What is rigid becomes brittle and breaks. What is supple bends and endures."
  
  Jin realizes her identity is like ice. Frozen. And any pressure shatters it.
  
  She begins to practice being more like water—no fixed form, responsive, adaptable.
  
  Not losing herself. But holding herself lightly. More like a river than a statue.
  
  And the shame that comes from not fitting her own rigid definition begins to dissolve. She's bigger than any single identity.
