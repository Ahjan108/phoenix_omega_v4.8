atom_id: master_wu_STORY_011
body: |
  Luo is anxious about not being enough. She's been trying harder, achieving more, proving her worth.
  
  None of it works. The anxiety returns.
  
  In meditation, she hears a teaching: "The usefulness of a cup is in its emptiness."
  
  She begins to understand. Her worth isn't in what she fills herself with. It's in the space she holds. The capacity. The emptiness.
  
  She stops adding. She stops proving. She just... exists, like the cup exists.
  
  And in that emptiness, something fills her that wasn't there before. Not because she achieved it, but because she finally stopped blocking it.
