atom_id: miki_STORY_000
body: |
  Nana sits by the window watching rain. She's been anxious all week—her job isn't secure, there's money worry—and her mind won't stop looking for solutions.
  
  But watching the rain, she notices something simple. The rain doesn't solve its own trajectory. It falls because it falls. It finds channels and pools because that's what water does.
  
  She doesn't need to figure it all out today. The problem is real. But so is this moment, this window, this rain.
  
  Something in her shoulders drops. Not because the worry is solved. But because she's stopped holding it as a betrayal. It's just weather. And she's watching it, which is enough.
