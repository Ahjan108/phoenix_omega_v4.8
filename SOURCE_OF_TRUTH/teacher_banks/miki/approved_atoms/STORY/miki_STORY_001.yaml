atom_id: miki_STORY_001
body: |
  Haru works in a high-pressure environment. She's burned out, but she doesn't have time to be burned out. There are deadlines.
  
  One morning she takes a different route to work and walks through a park. It's raining slightly. She notices the smell of wet earth—petrichor, they call it.
  
  She's not thinking about it as therapy. She's just walking and noticing. The cool air on her skin. The sound of water dripping from leaves.
  
  It takes seven minutes. When she gets to the office, the burnout is still there. But something in her has registered: *I can still feel the world. I'm still alive.*
  
  She resolves to do this once a week. A small boundary against the machinery.
