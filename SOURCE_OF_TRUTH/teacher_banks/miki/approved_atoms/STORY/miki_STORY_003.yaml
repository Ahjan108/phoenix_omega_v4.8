atom_id: miki_STORY_003
body: |
  Daiki has low self-worth. He's never felt like he measured up—at school, at work, in relationships. Everything he does feels insufficient.
  
  He's sitting outside a cafe when he watches a child watching pigeons. The child is completely absorbed. Not thinking about whether he's doing it right. Just watching the birds.
  
  Daiki realizes he's been performing his life for an audience that doesn't exist. He's been measuring himself against a standard that was never real.
  
  What would happen if he just lived? Not perfectly. Not successfully. Just present, like the child watching birds?
  
  It doesn't solve his self-worth immediately. But it shows him a direction toward something simpler.
