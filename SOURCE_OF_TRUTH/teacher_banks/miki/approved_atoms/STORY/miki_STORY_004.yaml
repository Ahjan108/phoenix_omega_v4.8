atom_id: miki_STORY_004
body: |
  Suki is anxious. Always has been. She's looking for a practice that will fix it, make her calm and stable.
  
  Someone invites her on a hike. It's not meditation. Just walking through forest.
  
  As she walks, the anxiety doesn't disappear. But something shifts. Her breath finds a rhythm with her steps. The sound of leaves. The texture of bark on trees.
  
  She's still anxious. But she's also here. Both things at once.
  
  At the end, she realizes she wasn't trying to be calm. She was just moving through a beautiful place. And that simple presence—not fighting the anxiety, not drowning in it, just being alive in it—was enough.
