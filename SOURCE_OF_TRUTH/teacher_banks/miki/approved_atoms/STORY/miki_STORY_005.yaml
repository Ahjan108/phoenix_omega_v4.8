atom_id: miki_STORY_005
body: |
  Rei has no boundaries. She's always available, always helping, always accommodating. She doesn't even know where she ends and others begin.
  
  One day she notices something: she's in a coffee shop and the barista says no to a customer's request. Not mean about it, just clear. And the customer accepts it.
  
  *That's how easy it can be*, Rei thinks. *Just a boundary. Not a conflict. Just a limit.*
  
  She starts small. When a friend asks for help, she says: "Let me think about it." Instead of automatic yes.
  
  The boundary-setting is clumsy at first. But something in her nervous system begins to understand: taking space isn't selfish. It's just honest.
