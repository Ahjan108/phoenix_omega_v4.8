atom_id: miki_STORY_006
body: |
  Masa is overwhelmed. There's too much to do, too many demands, no space for breath.
  
  Someone suggests he just sit outside for ten minutes. No meditation, no practice. Just outside.
  
  He sits on a bench. At first his mind is racing—all the things he should be doing. But then he notices the light on the trees. The way shadows move as clouds pass.
  
  Ten minutes of just being outside, paying attention to something other than his to-do list. It's not a cure. But something settles.
  
  He starts doing this daily. Not as practice, but as breath. A small boundary against the overwhelm, written in simplicity.
