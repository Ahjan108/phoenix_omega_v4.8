atom_id: miki_STORY_008
body: |
  Tomo is anxious about the future. What if she fails? What if she makes the wrong choice? The anxiety loops.
  
  She takes a walk in a forest and finds herself watching how trees grow. Asymmetrical. Some branches short, some long. Some bent by wind. None of them apologizing for it.
  
  They don't know the future either. They just grow in response to what's here—sun, rain, wind. They adapt as they go.
  
  Tomo realizes her anxiety is asking her to know something unknowable. But maybe she can just be like the tree—responding to what's actually present, not trying to predict the whole course.
  
  The anxiety doesn't disappear. But it loses its urgency.
