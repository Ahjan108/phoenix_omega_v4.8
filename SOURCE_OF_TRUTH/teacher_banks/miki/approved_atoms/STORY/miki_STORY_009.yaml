atom_id: miki_STORY_009
body: |
  Kimi has perfectionist tendencies. Everything she does must be flawless, or it's a failure. This drives her burnout.
  
  She's in a garden and notices the moss on the stones. Imperfect. Irregular. Growing without a plan. And it's beautiful.
  
  The moss isn't trying to be perfect moss. It's just doing what moss does—spreading, living, adapting.
  
  Something in Kimi softens. What if she stopped trying to make her life perfect? What if she just lived it, imperfectly, like everything else in nature?
  
  She can't abandon her standards overnight. But she's seen a glimpse of what might be possible if she did.
