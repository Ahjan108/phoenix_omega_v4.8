atom_id: miki_STORY_010
body: |
  Ryo is struggling with low self-worth. He compares himself constantly to others. He's never enough.
  
  One morning he notices a small bird on his balcony. The bird isn't comparing itself to other birds. It's not worried about whether it's a good enough bird.
  
  It's just being a bird. Eating, moving, existing.
  
  Ryo realizes he's been living in a constant audition. But the bird doesn't audition. The tree doesn't audition. The sky doesn't.
  
  What would it be like to just exist, like everything else? Not striving to prove his worth, but knowing it's already there, built in, like it is for every living thing?
