atom_id: miki_STORY_011
body: |
  Yua is burned out from giving. Always supporting others, always there. And now she's empty.
  
  Someone takes her to a forest and suggests she just rest. Not meditate. Just rest.
  
  She sits against a tree. Closes her eyes. Lets the forest hold her.
  
  In this moment, she's not taking care of anyone. Not managing anyone's emotions. Not solving anything.
  
  She's allowed to just exist, like the trees exist. Taking in light, water, air. Not producing anything. Not earning anything.
  
  It's only thirty minutes. But something deep in her nervous system understands: rest is not selfish. It's necessary. It's natural.
