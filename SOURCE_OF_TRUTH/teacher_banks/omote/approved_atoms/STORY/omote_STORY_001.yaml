body: |
  Yume performs competence in her job but feels shame about her uncertainty. The performance feels like a lie that will be exposed. But one day she notices: competence is real AND uncertainty is real. She can hold both. She stops trying to perform perfect certainty. Instead, she moves with a quiet confidence that includes her own learning. The body relaxes. The anxiety about being found out diminishes. Authenticity is not the absence of the social mask. It is knowing when you're wearing it and choosing to wear it consciously.
