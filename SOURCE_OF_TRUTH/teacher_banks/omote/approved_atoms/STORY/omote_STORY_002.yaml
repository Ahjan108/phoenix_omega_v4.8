body: |
  Sora is burning out from constant performance. She smiles, she performs enthusiasm, she manages everyone's comfort. But her body is screaming underneath the mask. She is exhausted from the effort. Then she realizes: the mask itself is not the problem. The problem is that there is no rest, no ura, no inside space that is truly hers. She begins to carve out time where the performance is released. Not everywhere, not with everyone, but in small protected spaces. She rests. In that rest, something restores. The mask becomes less tight because she is not wearing it constantly. Authentic presence returns.
