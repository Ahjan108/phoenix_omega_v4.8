body: |
  Nagi feels shame about being quiet in social situations. She thinks this means she's inauthentic, hiding her true self. But in inquiry, she realizes: her quietness is authentic. It is not a mask. It is her actual nature. What was inauthentic was the belief that she should perform more, talk more, be different. In accepting her quietness as her presence, not as a failure of presence, the shame dissolves. Authentic presence is aligned, not loud.
