body: |
  Koto is anxious about how she appears to others. She polishes her image, her words, her presentation. But the performance is tight, defended. One day she notices her body's signal: tension in her jaw, shallow breathing. These are signs of a mask worn with unconscious effort. She begins to ask: "What if I simply showed up as I actually am in this moment?" The risk feels enormous. But when she does, something unexpected happens. People relax around her. Authenticity is contagious. In the ma — the space between effort and surrender — she finds actual presence.
