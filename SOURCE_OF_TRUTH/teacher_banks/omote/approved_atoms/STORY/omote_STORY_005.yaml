body: |
  Haru notices she is performing cheerfulness even when she is sad. The smile is automatic. But now she is conscious of it. She asks herself: "Can I be sad and also present?" The answer is yes. She stops performing cheerfulness. She allows herself to be visibly sad when she is sad. The relief is immediate. Others respond with kindness rather than confusion. Authenticity is not positivity. It is honesty about what is actually present.
