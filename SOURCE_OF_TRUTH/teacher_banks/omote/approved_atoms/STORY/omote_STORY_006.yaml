body: |
  Momo performs strength and invulnerability to protect herself. But the performance is exhausting. She is alert to every response, every judgment. Then she realizes: the protection she thought the mask was giving her is actually restricting her. She begins to let people see her vulnerability. Not recklessly, but honestly. The world does not collapse. People respond with care. In releasing the performance of invulnerability, she discovers actual strength — the strength that comes from being known and still choosing to stay.
