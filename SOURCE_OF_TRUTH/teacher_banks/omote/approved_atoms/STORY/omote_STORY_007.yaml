body: |
  Aya is burning out from performing the role of caretaker. She is always available, always patient, always accommodating. Her burnout is shame because she believes the role means she should never be tired. But one day she notices: the mask is not the problem. Caring is real. But constant performance of caring with no rest becomes a lie. She begins to honor the ma — the space between action and rest. She rests. In that rest, she returns to actual care, not performed care. The mask loosens because she is not defending it constantly. She can be the caretaker AND the one who needs care.
