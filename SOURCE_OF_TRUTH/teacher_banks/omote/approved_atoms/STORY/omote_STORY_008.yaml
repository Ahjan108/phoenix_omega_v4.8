body: |
  Roku is self-conscious about his anxiety. He performs confidence to hide it. But the performance creates more anxiety. He is vigilant about maintaining the mask. Then he stops. He allows his anxiety to be visible. Something unexpected happens: the effort to hide it was more exhausting than being seen with it. In the space of allowed vulnerability, he finds actual presence. The ma — the space between performance and truth — becomes his ground.
