body: |
  Nao is performing success but feels ashamed of her uncertainty. The mask is tight. She moves through the world trying to appear as though she has it together. But her body knows she doesn't. The tension is constant. One day she allows someone to see her doubt. The sky does not fall. In that small moment of authenticity, something shifts. She realizes: authentic presence is not the absence of doubt. It is doubt held openly, without shame. She can perform her role AND be honest about her own uncertainty. The mask becomes lighter.
