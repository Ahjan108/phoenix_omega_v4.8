body: |
  Shio carries anxiety about being perceived as weak. She performs toughness. But the performance is relentless, and she is exhausted. She realizes the mask was never protecting her — it was imprisoning her. She begins to allow herself to be seen as she actually is: capable AND vulnerable. The relief is immediate. She can be strong in some things and uncertain in others. Authenticity holds multitudes.
