body: |
  Tsuki is performing the role of the person who has it all figured out. The performance is exhausting. She is anxious about any moment her uncertainty might show. Then she stops performing certainty. She allows herself to say: "I don't know." The response is not rejection but relief. People relax around her. In Noh theater, there is a concept called ma — the meaningful emptiness, the rest between action. Tsuki discovers that her authenticity is not in constant action but in the willingness to rest, to not know, to be still. In that stillness, actual presence emerges.
