atom_id: pamela_fellows_STORY_000
body: |
  Sarah's nervous system has been in high alert for months. Anxiety is constant. Her body doesn't feel safe.
  
  When her therapist first asks her to notice where safety shows up in her body, Sarah isn't sure she has any. But slowly, she begins to notice: in a friend's presence, at a certain time of day, when her hands are warm.
  
  Small things. But her nervous system begins to map safety. Not as the absence of anxiety, but as islands of regulation in the storm.
  
  By visiting those islands regularly, her nervous system learns: there are places where I can be less vigilant. The world is not all threat.
  
  Gradually, her window of tolerance widens. The anxiety doesn't disappear, but her capacity to hold it expands.
