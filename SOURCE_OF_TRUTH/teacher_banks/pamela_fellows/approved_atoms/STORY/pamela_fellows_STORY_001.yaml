atom_id: pamela_fellows_STORY_001
body: |
  Maya has carried shame her whole life. It lives in her body as collapse—a rounding of her shoulders, a hollowing of her chest.
  
  In somatic therapy, her therapist doesn't ask her to think differently about the shame. Instead, she invites Maya to notice what the shame does to her body.
  
  Maya notices: when shame activates, she disappears. Makes herself small. Her breath becomes shallow.
  
  Her therapist suggests a simple experiment: what if she straightened her spine just slightly? Not as a fix, but as an offering to her body.
  
  In that small movement, something shifts. She can feel the shame, but she's not collapsing into it. The body has agency. And that agency changes everything.
