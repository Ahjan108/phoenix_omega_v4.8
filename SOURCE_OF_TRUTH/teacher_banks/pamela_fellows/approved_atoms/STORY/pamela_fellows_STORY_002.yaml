atom_id: pamela_fellows_STORY_002
body: |
  Jordan is grieving. A loss. The grief is enormous, and it comes in waves that destabilize his nervous system.
  
  When he tries to "process" the grief, it overwhelms him. But his therapist teaches him titration: approach the grief in small doses.
  
  For five minutes, he lets himself feel it. Then he does something grounding—feels his feet on the floor, touches the wall, hears actual sounds.
  
  Then five minutes of grief again. Then resource.
  
  This pendulation—between the grief and the ground—keeps his nervous system from dysregulating completely.
  
  The grief is honored. But so is his capacity. Both matter.
