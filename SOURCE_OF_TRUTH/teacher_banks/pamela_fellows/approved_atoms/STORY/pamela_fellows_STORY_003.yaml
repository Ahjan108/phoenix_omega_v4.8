atom_id: pamela_fellows_STORY_003
body: |
  Alex carries old trauma. Small things trigger her—a tone of voice, a particular smell. Her body goes into threat response instantly.
  
  Her therapist explains: your nervous system learned something is dangerous. We can't think our way out of that. We need to help your nervous system learn safety.
  
  It's slow. Alex begins to notice when her nervous system is triggered, and she practices small moments of grounding.
  
  She feels her feet. She names five things she can see. She reminds herself: this moment is actually safe, even though my body thinks it's not.
  
  Over time, the gap between trigger and actual danger becomes visible. Her nervous system gradually believes it.
