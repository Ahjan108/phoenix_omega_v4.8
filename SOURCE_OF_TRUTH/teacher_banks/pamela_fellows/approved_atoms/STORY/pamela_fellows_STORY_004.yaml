atom_id: pamela_fellows_STORY_004
body: |
  Emma is scared of her own anger. She was taught that anger is dangerous—that it hurts people. So she's suppressed it for years.
  
  The suppression costs her. She has no boundaries. She people-pleases exhaustedly.
  
  Her therapist says something radical: "Your anger is information. It's telling you something matters. Can we listen to it together?"
  
  Slowly, Emma learns to let the anger be present without acting destructively. She feels it, she hears what it's saying, and she respond differently.
  
  The anger doesn't disappear, but it becomes an ally instead of an enemy. Her boundaries become possible.
