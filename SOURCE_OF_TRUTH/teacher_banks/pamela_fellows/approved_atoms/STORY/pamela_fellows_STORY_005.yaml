atom_id: pamela_fellows_STORY_005
body: |
  Chloe has low self-worth. Her nervous system was never taught safety in relationships. She learned that love meant being hurt.
  
  When a new relationship begins, her nervous system sabotages it. She finds danger where there is none.
  
  Her therapist helps her understand: you learned something about relationships. Your body is trying to protect you by finding threat.
  
  The healing comes through co-regulation. In the safety of the therapeutic relationship, Chloe's nervous system learns a different pattern.
  
  She still struggles with trust. But now her body has one memory of safety. Of someone staying even when things are hard.
  
  That memory changes everything.
