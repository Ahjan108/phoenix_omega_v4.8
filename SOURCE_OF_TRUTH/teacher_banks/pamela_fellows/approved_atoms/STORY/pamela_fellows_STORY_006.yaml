atom_id: pamela_fellows_STORY_006
body: |
  Isabel is drowning in overwhelm. Her nervous system is constantly in activation. She can't sleep. She can't rest.
  
  Her therapist doesn't ask her to relax. First, they help her recognize: you're in activation. Your window of tolerance is very narrow right now.
  
  They work with titration. Helping her notice when she's at her limit, and then helping her come back down.
  
  Slowly, with repetition, Isabel's nervous system learns it can handle the up and the down. The window widens.
  
  The overwhelming situation doesn't change. But her capacity to be with it does. And that capacity is what's actually healing.
