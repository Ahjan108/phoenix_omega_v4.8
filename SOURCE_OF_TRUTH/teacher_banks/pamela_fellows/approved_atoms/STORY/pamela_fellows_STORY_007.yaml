atom_id: pamela_fellows_STORY_007
body: |
  Diane is afraid to grieve. Loss would break her. So she's locked down, dissociated, numb.
  
  Her therapist's question is different: "What if your body could hold this grief? What if we went slowly?"
  
  They practice titration. A moment of grief. Then grounding. A moment of grief. Then resource.
  
  Slowly, Diane's nervous system learns something: grief doesn't destroy. It moves through. And I can be present for it.
  
  By the end, she's not "over" the loss. But she's grieving it. And the grieving itself feels like honoring what mattered.
  
  The courage came from taking it in doses her body could manage.
