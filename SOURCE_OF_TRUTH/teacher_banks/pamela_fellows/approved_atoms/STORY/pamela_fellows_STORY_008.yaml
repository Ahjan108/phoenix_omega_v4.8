atom_id: pamela_fellows_STORY_008
body: |
  Kate has never had a sense of her own boundaries. She was taught her body didn't belong to her. That her needs didn't matter.
  
  Her body carries this knowledge as a kind of collapse. A self-abandonment.
  
  In somatic therapy, the work is simple: reconnect you to your body. It's yours. It has wisdom.
  
  Kate practices feeling her breath. Her heartbeat. The sensation of her feet on the floor.
  
  Not meditation. Just reconnection. The nervous system gradually learns: I have a body. It has boundaries. And I get to say what happens in it.
  
  The boundary-setting becomes possible only after the reconnection.
