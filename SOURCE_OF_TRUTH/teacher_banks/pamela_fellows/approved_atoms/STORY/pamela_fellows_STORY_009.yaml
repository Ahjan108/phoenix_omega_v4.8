atom_id: pamela_fellows_STORY_009
body: |
  Nora is burned out. She's been running on empty for so long she doesn't remember what rest feels like.
  
  Her therapist says: "Your nervous system is depleted. Before we do anything else, we need to give it access to genuine rest."
  
  But Nora doesn't know how to rest. Resting feels irresponsible.
  
  So they start small. Five minutes where Nora doesn't have to produce or perform or manage. Just lie there. Her therapist nearby. Safe.
  
  It's awkward at first. But gradually, Nora's nervous system remembers. She has a body that can rest. And rest is not selfish. It's necessary.
