atom_id: pamela_fellows_STORY_010
body: |
  Lynn is trying to find courage to speak her truth. But her nervous system has learned silence is safe.
  
  Her therapist helps her understand: courage is not the absence of fear. It's moving toward something that matters even though you're scared.
  
  They practice this in the session first. Lynn speaks a small truth. Her nervous system floods with fear. But the therapist is there, steady.
  
  Over time, the pairing changes Lynn's nervous system. Truth + safety. Truth + somebody witnesses.
  
  When she eventually speaks the truth in her life, her nervous system is less dysregulated. It's learned: saying true things in the presence of someone safe is survivable.
