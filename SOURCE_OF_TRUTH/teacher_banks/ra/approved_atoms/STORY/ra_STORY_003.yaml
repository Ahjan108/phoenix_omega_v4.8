atom_id: ra_STORY_003
body: 'Yaw is anxious about his worth. He constantly measures himself against others and finds himself wanting. The comparison is relentless.

Ra invites him to practice clarity of observation. Not judgment. Clarity. To notice the comparing mind without believing it. To see the thoughts as they arise and pass, like clouds crossing the sky.

Yaw sits with this. He watches the thoughts come: you are not good enough. You will never be enough. Others are better. The witness observes these thoughts, and in the observing, something becomes clear: the thoughts are not truth. They are just patterns that have been conditioned into him.

Ra tells him: what you are is the awareness that observes the thoughts. That awareness has no status. It needs no achievement. It simply is. Everything else—the worth you are seeking, the validation you are chasing—these are clouds. What you are is the sky.'
