atom_id: ra_STORY_004
body: 'Nana has spiraled into anxiety so complete that she has forgotten there is anything else. The spiral is her entire world.

Ra teaches her a simple practice: notice what is true right now. Not the story about what might happen. Not the fear. What is actually true in this moment?

She notices: I am sitting. The light is coming through the window. My breath is moving. There is pain in my chest and also the ground beneath me.

Ra says: this is clarity. This is what is. Notice that the observer of all this is not the pain. The observer is untouched by the pain. Can you find that observer?

Slowly, Nana learns to inhabit that place of observation. The anxiety is still there, but her identity is no longer the anxiety. She is the space in which it appears. And that space is vaster than she ever imagined.'
