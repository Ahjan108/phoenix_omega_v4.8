atom_id: ra_STORY_005
body: 'Kwame has a fear of losing everything he loves, and the fear has made him rigid, controlling, always trying to secure what cannot be secured. The anxiety is a constant vigilance.

Ra teaches him: observe the fear without fighting it. What do you see?

Kwame sits with the fear. He notices it is a gripping sensation in his chest. He notices the thoughts that accompany it. He notices the impulse to control.

Ra continues: what is observing all this?

Kwame pauses. Something in him is noticing the fear but is not the fear.

Ra says: that is where clarity lives. In that observation. When you are fused with the fear, you are driven to control. When you observe the fear, you see it clearly. You see that the fear is generated by the attempt to hold what cannot be held. And you see that what you are—the witness—cannot be lost, because it is not bound by time. What passes through it is not what you are.'
