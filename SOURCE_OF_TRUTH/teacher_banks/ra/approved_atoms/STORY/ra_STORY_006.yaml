atom_id: ra_STORY_006
body: 'Ife is in a spiral of shame. When Ra asks her to observe the shame, she cannot. The shame is too close. It is her.

Ra is patient. He does not push her to transcend the shame. Instead, he invites her to notice the smallest thing: the fact that she is aware of the shame. That awareness is present.

Slowly, Ife begins to locate a place in her consciousness that is observing the shame without being consumed by it. It is not a place she reaches by fighting the shame. It is a place she finds by recognizing that she is more than the shame.

Ra says: you are the vast awareness in which everything appears, including shame. When you know yourself as that awareness, the shame is no longer who you are. It is something appearing in the space of who you are.'
