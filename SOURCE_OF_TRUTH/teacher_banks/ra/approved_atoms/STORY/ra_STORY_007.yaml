atom_id: ra_STORY_007
body: 'Olu is grieving his father and the grief has collapsed him into a state of total identification with loss. He is the grieving son. He is the one who failed to say goodbye. He is emptiness.

Ra invites him into silence. Not the silence of suppression. The silence of observation. In that silence, the grief is present, but it is being held by something vaster. The consciousness that is aware of the grief. The ground that does not move.

Olu sits with this day after day. Slowly, he begins to recognize that while the grief is immense and real and deserves to be honored, it is not all that he is. There is the one who grieves. And there is the awareness that witnesses the griever. And that awareness is eternal, unchanged, unharmed.

In that recognition, the grief does not disappear. But it finds its true place. It is held. And the one who holds it is vast.'
