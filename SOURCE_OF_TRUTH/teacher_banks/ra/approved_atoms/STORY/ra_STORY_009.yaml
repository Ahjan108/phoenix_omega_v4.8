atom_id: ra_STORY_009
body: 'Adaeze is afraid of her own power and clarity. When she speaks her truth, others become upset, and she has learned to interpret her clarity as a threat. So she shrinks.

Ra teaches her that witnessing clarity does not require her to diminish herself. Clarity is not aggression. It is kindness. To see what is true and speak it is a gift, not a wound.

He says: when you withhold your clarity out of fear of others'' reactions, you betray both yourself and them. Clarity is kindness. Have the courage to see clearly and speak clearly.

Adaeze practices. She notices the fear that arises when she is about to speak truth. She observes the fear without being collapsed by it. From that observation, she can choose to speak anyway. Her clarity is not a weapon. It is a light.'
