atom_id: sai_ma_STORY_000
body: 'Priya arrives at Sai Maa''s door carrying shame like a stone. She has made a choice that her family does not approve of, and in their disappointment, she has internalized their judgment as proof of her own unworthiness.

Sai Maa does not offer reassurance. She simply looks at Priya with eyes that seem to hold tenderness without question. She says: what is it that you believe about yourself?

Priya tries to speak and cannot. Tears come.

Sai Maa places a hand on her chest and says: here. The shame you feel is not the truth. It is a story the mind has learned from others. Your heart knows something different. It knows you are already worthy. It knows this not because of anything you have done, but because you exist.

Something in Priya''s chest begins to crack open. Not healing in one moment. But recognition that perhaps she has been believing a lie about herself.'
