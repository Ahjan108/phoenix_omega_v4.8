atom_id: sai_ma_STORY_002
body: 'Kavya is grieving. Her mother died six months ago and the grief has not softened. People around her want her to move on, to be strong, to find the spiritual meaning in the loss. But Kavya is not ready. She is angry at the universe, at God, at her mother for leaving.

Sai Maa does not rush her toward healing. She simply sits with Kavya and says: grief is love with nowhere to go. It is the full measure of what your mother meant to you. Do not let anyone tell you this should be smaller or faster.

Sai Maa opens her heart and allows Kavya to pour her grief into that space. There is no judgment. No attempt to fix it. Only a vast, tender witnessing.

After a long time, Kavya says: I am angry at her.

Sai Maa nods. Of course you are. Love and anger are the same fire. She has left a perfect mirror of how much she mattered.'
