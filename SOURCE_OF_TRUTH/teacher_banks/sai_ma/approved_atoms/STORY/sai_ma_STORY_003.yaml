atom_id: sai_ma_STORY_003
body: 'Deepa has learned to set boundaries after years of people-pleasing, but now she is wracked with guilt. She feels as though by saying no, she has abandoned others. The anxiety spirals: perhaps she is selfish, perhaps she is not capable of love.

Sai Maa asks her: who taught you that love means abandoning yourself?

Deepa cannot answer.

Sai Maa continues: true love is a fountain, not a drain. When you pour from an empty well, you have nothing to give anyone. Boundaries are not selfishness. They are the foundation of authentic love. When you say no to what does not serve you, you say yes to the one person who has the most claim on your devotion: yourself.

Deepa feels the knot in her chest begin to ease. For the first time, she allows the possibility that taking care of herself is not a betrayal of love, but an expression of it.'
