atom_id: sai_ma_STORY_004
body: 'Amara has been living in a state of constant anxiety because she is trying to earn approval from people who cannot give it. She has twisted herself into shapes she does not recognize trying to be acceptable.

Sai Maa takes her hands and says: look at me. Do you see this light in my eyes? This is the light that lives in you. Not when you achieve something. Not when someone approves. It is simply there because you exist. You came into the world already complete, already worthy. Everything you have done since is an attempt to prove what was never in doubt.

She places Amara''s hand on her own heart and says: can you feel your own heartbeat? That rhythm is Shakti saying: I am. That is enough.

For the first time in decades, Amara wonders what would happen if she stopped performing and simply allowed herself to exist.'
