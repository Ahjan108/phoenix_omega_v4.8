atom_id: sai_ma_STORY_005
body: 'Sita has a voice inside her that is constantly critical. It tells her she is not good enough, not strong enough, not worthy of love. The voice is so familiar that she has mistaken it for truth.

Sai Maa teaches her to turn toward that voice with love instead of resistance. She says: that critical voice is not your enemy. It is a frightened part of you that learned, long ago, that the world was unsafe. It has been trying to protect you by making you small, by keeping you from risking rejection.

She guides Sita through a practice of recognizing the voice and responding to it not with argument, but with tender compassion. With the same love a mother would offer a scared child.

Over weeks, the voice does not disappear, but its charge diminishes. Sita is no longer at war with herself. She is holding herself with loving awareness.'
