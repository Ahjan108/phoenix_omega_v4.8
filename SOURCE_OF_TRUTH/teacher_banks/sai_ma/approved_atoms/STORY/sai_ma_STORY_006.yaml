atom_id: sai_ma_STORY_006
body: 'Maya has lived through trauma and her nervous system is still in a state of hypervigilance. She is afraid of her own vulnerability, afraid that if she opens her heart, she will be destroyed again.

Sai Maa does not ask her to heal quickly or to trust before she is ready. Instead, she teaches her that the heart is not fragile. It is the strongest thing in the universe. It has survived everything that has happened to it and is still beating, still loving.

She says: your heart is not weak because it broke. It is wise. It knows now what it is capable of holding. Healing is not about becoming invulnerable. It is about discovering that you are more resilient than you believed.

Slowly, Maya begins to re-inhabit her own heart space. Not in denial of what happened, but in recognition that what happened does not define what is possible.'
