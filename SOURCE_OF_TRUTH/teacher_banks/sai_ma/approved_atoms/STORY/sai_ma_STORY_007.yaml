atom_id: sai_ma_STORY_007
body: 'Devi comes from a tradition where women are taught that their worth comes from service to others. She has sacrificed her own needs so completely that she does not know who she is apart from what she does for others. The burnout is profound.

Sai Maa asks her: what would happen if, for one day, you treated yourself with the same devotion you show others?

Devi cannot imagine it. It feels selfish.

Sai Maa takes her hand and says: you have been taught that love flows one direction: outward. But this is a broken circuit. True love is a circle. It flows out, and it flows back in. If you give without receiving, you empty yourself. The world does not need your depletion. It needs you whole.

She invites Devi to experience what it feels like to be held by love rather than to hold others through love. In that reversal, something shifts.'
