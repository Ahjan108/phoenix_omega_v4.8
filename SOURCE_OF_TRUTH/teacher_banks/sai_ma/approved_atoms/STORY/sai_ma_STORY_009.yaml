atom_id: sai_ma_STORY_009
body: 'Riya is in a relationship where her boundaries are constantly violated and she cannot leave. The guilt and shame are enormous. She feels responsible for his feelings, responsible for keeping the peace.

Sai Maa does not tell her what to do. Instead, she asks: what is it that you believe you owe anyone at the cost of yourself?

Riya cannot answer.

Sai Maa continues: love is not a reason to disappear. If you love someone, you owe them honesty. You owe them a version of you that is intact, alive, whole. You do not owe them your destruction. The idea that you do is not love. It is a trap.

She teaches Riya that courage is not the absence of fear. Courage is love strong enough to protect its own heart. It takes time, but Riya begins to imagine a version of herself that can exist without apology.'
