atom_id: sai_ma_STORY_010
body: 'Nila has been afraid to name her needs for fear that it will make her a burden. So she has shrunk herself, denied herself, made herself smaller. The anxiety is constant because the cost of being invisible is high.

Sai Maa asks her to speak her needs out loud, even if they feel selfish. It takes a long time. Nila is shaking.

When she finally speaks, Sai Maa says: yes. This is what the heart sounds like when it is finally allowed to speak. This is not selfish. This is sacred. Your needs are not a burden. Your existence is not a burden. The world wants you whole, not small.

She invites Nila to practice speaking her truth daily, in small ways. Each time, the shame decreases and the sense of aliveness increases.'
