# Editorial programs: Brand → Program → Series → Book.
# Authority: docs/CATALOG_ARCHITECTURE_AT_SCALE.md. Reduces spam-pattern risk by making
# platforms see many independent publishing programs, not one content network.
#
# Phase 1: 10 programs across top 2 brands (5 each).
# Uniqueness: strict (brand_id, worldview_id) per program for catalog differentiation.
# CI check: scripts/ci/check_editorial_programs_uniqueness.py --strict | (default: triple)
# Each program has: theme, worldview_id, teachers, metadata_style_family, narrator_pool_id, cover_style.

schema_version: 1

programs:
