# Machine-readable required status checks policy for main.
# Used by scripts/ci/verify_github_governance.py and scripts/ci/validate_required_checks_match.py.
# Store EXACT check run names as emitted by workflows (job name: or job id).
# Branch protection must require these exact strings.
version: 1

# Required status checks for main. Each must match a job name in some workflow.
always_required:
  - "Core tests"
  - "Release gates"
  - "EI V2 gates"
  - "Change impact"
  - "truth-audit-gate"
  - "drift-gate"

# Path-filtered checks: optional. If required on main, they must not be the only required checks.
path_filtered_optional:
  - "EI V2 unit tests"
  - "Teacher gates"
  - "Brand guards"
  - "Pearl News gates"
