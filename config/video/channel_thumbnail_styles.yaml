# Per-channel thumbnail visual identity.
# Each channel MUST produce thumbnails that look distinct from every other channel.
# Palette derived from brand_style_tokens.yaml → bands → topics → palette.
# Authority: docs/VIDEO_PIPELINE_SPEC.md §10 (thumbnail), §15 (anti-spam).
#
# Rule: No two channels may share the same (bg_hex, text_hex, accent_hex) triple.
# generate_thumbnail.py resolves channel_id → palette here, overriding the shared hook band.

# ── CALM & HEALING (1–6) ─────────────────────────────────────────────────────

ch_001:
  # Soft Ghibli — anxiety, cool_calm
  bg_hex: "#1B2A3A"        # dark steel blue (from anxiety slate tones)
  text_hex: "#C5D1DB"      # pale mist blue
  accent_hex: "#7B8FA1"    # slate blue grey
  font_style: clean        # standard sans-serif

