    duration_minutes: 5
    delivery_format: text_reflection
    safety_note: "Use measured, truthful language."
    steps:
      - "Name one truth about this inequality that needs to be spoken."
      - "Draft one statement to a relevant institution."
      - "Send it within 72 hours."

  - exercise_id: pamela_peace_social_4min
