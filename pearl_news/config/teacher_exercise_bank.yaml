  - exercise_id: pamela_inequality_reflective_5min
    teacher_id: pamela_fellows
    topic: inequality
    sdg: "10"
    exercise_type: reflective
    age_fit: both
    intent: understand
    locale: all
    approved: true
    name: "Pamela's Lectio Pause for Justice"
    exercise_description: "A reflective exercise using lectio divina to read one news paragraph slowly, identify one word that stands out, and choose one action honoring human dignity."
    duration_minutes: 5
    delivery_format: text_reflection
    safety_note: "If content triggers deep grief, stop and seek community support."
    steps:
      - "Read one paragraph about this issue slowly, twice."
      - "Name one word or phrase that stands out. Sit with it for 1 minute."
      - "Write one action that honors human dignity."

  - exercise_id: pamela_inequality_civic_5min
