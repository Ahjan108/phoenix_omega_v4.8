    age_fit: both
    intent: regulate
    locale: all
    approved: true
    name: "Conflict Nervous System Reset"
    exercise_description: "A regulation exercise that settles the nervous system after conflict exposure, helping readers separate facts from assumptions before taking action."
    duration_minutes: 5
    delivery_format: audio
    safety_note: "Step away from live conflict feeds if overwhelmed."
    steps:
      - "A brief breath-regulation interval to settle attention."
      - "Separate known facts from assumptions."
      - "Choose one non-reactive action for today."

  - exercise_id: td_peace_civic_5min
    topic: peace_conflict
    sdg: "16"
