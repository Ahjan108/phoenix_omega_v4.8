# Pearl News — Canonical Teacher Exercise Bank v3
# ~150 exercises with diverse exercise_type per teacher.
# Resolver: 4-tier fallback + policy_rank (type preference) + hash tie-break.
# "Description, not guided practice" — steps are components, not scripted instructions.
#
# exercise_type: somatic | cognitive | reflective | civic | social | study | planning
# age_fit: gen_z | gen_alpha | both
# intent: regulate | understand | decide | act | recover_focus
# article_types: [all] or specific template list

version: 3

exercises:

  # ══════════════════════════════════════════════════════════
  # TOPIC DEFAULTS — tier 4 (no teacher_id)
  # 3 per topic × 7 topics = 21 exercises, diverse types
  # ══════════════════════════════════════════════════════════

  # --- climate ---
  - exercise_id: td_climate_regulate_4min
    topic: climate
    sdg: "13"
    exercise_type: regulate
    age_fit: both
    intent: regulate
    locale: all
    approved: true
    name: "Climate Grounding Reset"
    exercise_description: "A short regulation exercise that helps readers settle climate anxiety by identifying one concrete stressor and choosing one local action within 24 hours."
    duration_minutes: 4
    delivery_format: audio
    safety_note: "Pause if dizzy or distressed. Return to normal breathing."
    steps:
      - "Identify one climate stressor you feel in your body right now."
      - "A brief breath-regulation interval to settle attention."
      - "Write one local action you can complete in 24 hours."

  - exercise_id: td_climate_civic_5min
    topic: climate
    sdg: "13"
    exercise_type: civic
    age_fit: gen_z
    intent: act
    locale: all
    approved: true
    name: "Climate Civic Action Mapper"
    exercise_description: "A civic exercise that maps one local climate adaptation opportunity and produces one actionable contact or registration step within 72 hours."
    duration_minutes: 5
    delivery_format: text_reflection
    safety_note: "Keep scope realistic and local."
    steps:
      - "Name one local climate initiative or meeting happening this month."
      - "Identify one person or institution to contact."
      - "Draft one message or register for one event."

  - exercise_id: td_climate_cognitive_5min
    topic: climate
    sdg: "13"
    exercise_type: cognitive
    age_fit: both
    intent: understand
    locale: all
    approved: true
    name: "Climate Systems Clarity Check"
    exercise_description: "A cognitive exercise that separates climate facts from assumptions, helping readers identify one concrete data point and one traceable cause-effect chain."
    duration_minutes: 5
    delivery_format: text_reflection
    safety_note: "If eco-anxiety spikes, pause and return to breath."
    steps:
      - "Name one climate claim from the article and check if you can trace it to a data source."
      - "Separate one fact from one assumption you hold about this topic."
      - "Write one question you still need answered."

  # --- peace_conflict ---
  - exercise_id: td_peace_social_5min
    topic: peace_conflict
    sdg: "16"
    exercise_type: social
    age_fit: both
    intent: decide
    locale: all
    approved: true
    name: "Conflict De-escalation Dialogue Prep"
    exercise_description: "A social exercise that prepares readers for constructive dialogue by identifying one reactive pattern and choosing one question to replace a reactive statement."
    duration_minutes: 5
    delivery_format: text_reflection
    safety_note: "Do not engage in active confrontation. Use moderated settings."
    steps:
      - "Name one reactive claim you tend to make about this conflict."
      - "Replace it with one genuine question."
      - "Choose one relationship-preserving action for today."

  - exercise_id: td_peace_regulate_5min
    topic: peace_conflict
    sdg: "16"
