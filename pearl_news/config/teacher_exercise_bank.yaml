    safety_note: "Avoid unsafe confrontation. Work within moderated channels."
    steps:
      - "Name one stakeholder or institution connected to this conflict."
      - "Draft one short de-escalating message or inquiry."
      - "Choose a channel and send or schedule it within 48 hours."

